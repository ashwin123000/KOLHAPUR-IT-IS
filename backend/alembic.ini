# Alembic Configuration File
# Master Prompt V2.0 - Database Migration Configuration

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration file names
file_template = %%(rev)s_%%(slug)s

# sys.path path, will be prepended to sys.path if present
prepend_sys_path = .

# timezone to use when rendering the timestamp
# (leave empty to use local time)
timezone =

# max length of characters to apply to the
# "slug" field when generating migration file
# names.  The default value is 40 which requires
# fairly terse descriptions.
# you might increase this for more descriptive names.
truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
sqlalchemy.url = driver://user:pass@localhost/dbname


# Logging configuration
# Loggers to configure in logging config.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
